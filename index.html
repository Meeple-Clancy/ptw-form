  <script>
    // Example: replace with your real data
    const games = [
      { catalogID: 'WING-001', game_name: 'Wingspan', PTWID: 1 },
      { catalogID: 'WING-002', game_name: 'Wingspan', PTWID: 1 },
      { catalogID: 'HEAT-001', game_name: 'Heat: Pedal to the Metal', PTWID: 2 }
    ];

    const gameInput = document.getElementById('game-input');
    const suggestions = document.getElementById('suggestions');
    const gameNameHidden = document.getElementById('game-name'); // keep this
    const form = document.getElementById('ptw-form');
    const status = document.getElementById('status');

    let selectedGame = null;

    gameInput.addEventListener('input', () => {
      const q = gameInput.value.toLowerCase();
      suggestions.innerHTML = '';
      gameNameHidden.value = '';
      selectedGame = null;

      if (!q) return;

      games
        .filter(g =>
          g.game_name.toLowerCase().includes(q) ||
          g.catalogID.toLowerCase().includes(q)
        )
        .slice(0, 10)
        .forEach(g => {
          const li = document.createElement('li');
          li.textContent = `${g.game_name} (${g.catalogID})`;
          li.onclick = () => {
            gameInput.value = g.catalogID;
            gameNameHidden.value = g.game_name;
            selectedGame = g;
            suggestions.innerHTML = '';
          };
          suggestions.appendChild(li);
        });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const badge = document.getElementById('badge-input').value;

      if (!selectedGame) {
        status.textContent = 'Please choose a game from the list.';
        return;
      }

      status.textContent = 'Saving entry...';

      fetch('https://script.google.com/macros/s/AKfycbzzyTVa-WYFfIuznmdcSqFtvGr4pyqnit9YACqKewnn8agKDS_qCT3iQ-bS4h9RRqGkvQ/exec', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          game_name: selectedGame.game_name,
          catalogID: selectedGame.catalogID,
          badge: badge,
          PTWID: selectedGame.PTWID
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'ok') {
          status.textContent = 'Entry saved. You can now enter another.';
          form.reset();
          suggestions.innerHTML = '';
          selectedGame = null;
        } else {
          status.textContent = 'There was a problem saving. Please try again.';
        }
      })
      .catch(err => {
        console.error(err);
        status.textContent = 'Error talking to the server. Please try again.';
      });
    });
  </script>
</body>
</html>
