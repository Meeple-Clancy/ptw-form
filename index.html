<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Play to Win Entry</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    .suggestions { border: 1px solid #ccc; max-height: 200px; overflow-y: auto; margin-top: 0; padding-left: 0; }
    .suggestions li { list-style: none; padding: 4px 8px; cursor: pointer; }
    .suggestions li:hover { background: #eee; }
    label { display: block; margin-top: 1rem; }
    input[type="text"], input[type="number"] { width: 100%; padding: 6px; }
    button { margin-top: 1rem; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Play to Win Entry</h1>

  <form id="ptw-form" method="POST" target="hidden_iframe"
        action="https://script.google.com/macros/s/AKfycbzzyTVa-WYFfIuznmdcSqFtvGr4pyqnit9YACqKewnn8agKDS_qCT3iQ-bS4h9RRqGkvQ/exec">
    <label for="game-input">Game (type name or catalog ID)</label>
    <input id="game-input" type="text" autocomplete="off"
           placeholder="Start typing a game name or catalog ID…">
    <ul id="suggestions" class="suggestions"></ul>

    <!-- Hidden fields actually sent to Apps Script -->
    <input type="hidden" name="game_name" id="game-name">
    <input type="hidden" name="catalogID" id="catalog-id">
    <input type="hidden" name="PTWID" id="ptw-id">

    <label for="badge-input">Badge number</label>
    <input id="badge-input" name="badge" type="number" required>

    <button type="submit">Submit entry</button>
  </form>

  <!-- Hidden iframe so the form POST doesn't navigate away -->
  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <p id="status"></p>
