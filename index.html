<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Play to Win Entry</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    label { display: block; margin-top: 1rem; }
    select, input[type="number"] { width: 100%; padding: 6px; }
    button { margin-top: 1rem; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Play to Win Entry</h1>

  <form id="ptw-form" method="POST" target="hidden_iframe"
        action="https://script.google.com/macros/s/AKfycbzzyTVa-WYFfIuznmdcSqFtvGr4pyqnit9YACqKewnn8agKDS_qCT3iQ-bS4h9RRqGkvQ/exec">
    <label for="game-select">Game</label>
    <select id="game-select" name="game_name" required>
      <option value="">Choose a game…</option>
      <option value="Wingspan">Wingspan</option>
      <option value="Heat: Pedal to the Metal">Heat: Pedal to the Metal</option>
    </select>

    <label for="catalog-input">Catalog ID</label>
    <input id="catalog-input" name="catalogID" type="text" required>

    <label for="ptw-input">PTW ID</label>
    <input id="ptw-input" name="PTWID" type="number" required>

    <label for="badge-input">Badge number</label>
    <input id="badge-input" name="badge" type="number" required>

    <button type="submit">Submit entry</button>
  </form>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <p>After submitting, check your Google Sheet for the new row.</p>
</body>
</html>
