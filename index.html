<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Play to Win Entry</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
      }
      label {
        display: block;
        margin-top: 16px;
        margin-bottom: 4px;
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
      button {
        margin-top: 20px;
        padding: 10px 18px;
      }
      #message {
        margin-top: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Play to Win Entry</h1>

    <form id="ptw-form">
      <label for="game_name">Game</label>
      <select id="game_name" name="game_name" required>
        <option value="">Select a game</option>
        <option value="Wingspan">Wingspan</option>
        <option value="Catan">Catan</option>
        <option value="Terraforming Mars">Terraforming Mars</option>
        <!-- add more as needed -->
      </select>

      <label for="catalogID">Catalog ID</label>
      <input type="text" id="catalogID" name="catalogID" required>

      <label for="PTWID">PTW ID</label>
      <input type="text" id="PTWID" name="PTWID" required>

      <label for="badge">Badge number</label>
      <input type="text" id="badge" name="badge" required>

      <button type="submit">Submit entry</button>
    </form>

    <div id="message"></div>

    <p>After submitting, check your Google Sheet for the new row.</p>

    <script>
      const WEB_APP_URL =
        'https://script.google.com/macros/s/AKfycbzzyTVa-WYFfIuznmdcSqFtvGr4pyqnit9YACqKewnn8agKDS_qCT3iQ-bS4h9RRqGkvQ/exec';

      const form = document.getElementById('ptw-form');
      const messageEl = document.getElementById('message');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        messageEl.textContent = 'Submitting...';

        const formData = new FormData(form);

        try {
          const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: formData
          });

          const data = await response.json();

          if (data.status === 'ok') {
            messageEl.textContent = 'Entry recorded. You can submit another.';
            // Prefill the form with the returned values
            document.getElementById('game_name').value = data.game_name || '';
            document.getElementById('catalogID').value = data.catalogID || '';
            document.getElementById('PTWID').value = data.PTWID || '';
            document.getElementById('badge').value = data.badge || '';
          } else {
            messageEl.textContent = 'There was a problem recording your entry.';
          }
        } catch (err) {
          console.error(err);
          messageEl.textContent = 'Network or script error submitting entry.';
        }
      });
    </script>
  </body>
</html>
