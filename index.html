  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Example: replace with your real data
      const games = [
        { catalogID: 'WING-001', game_name: 'Wingspan', PTWID: 1 },
        { catalogID: 'WING-002', game_name: 'Wingspan', PTWID: 1 },
        { catalogID: 'HEAT-001', game_name: 'Heat: Pedal to the Metal', PTWID: 2 }
      ];

      const gameInput = document.getElementById('game-input');
      const suggestions = document.getElementById('suggestions');
      const gameNameHidden = document.getElementById('game-name');
      const form = document.getElementById('ptw-form');
      const status = document.getElementById('status');

      let selectedGame = null;

      gameInput.addEventListener('input', () => {
        const q = gameInput.value.toLowerCase();
        suggestions.innerHTML = '';
        gameNameHidden.value = '';
        selectedGame = null;

        if (!q) return;

        games
          .filter(g =>
            g.game_name.toLowerCase().includes(q) ||
            g.catalogID.toLowerCase().includes(q)
          )
          .slice(0, 10)
          .forEach(g => {
            const li = document.createElement('li');
            li.textContent = `${g.game_name} (${g.catalogID})`;
            li.onclick = () => {
              // show only the catalogID in the input after selection
              gameInput.value = g.catalogID;
              gameNameHidden.value = g.game_name;
              selectedGame = g;
              suggestions.innerHTML = '';
            };
            suggestions.appendChild(li);
          });
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const badge = document.getElementById('badge-input').value;

        if (!selectedGame) {
          status.textContent = 'Please choose a game from the list.';
          return;
        }

        status.textContent = 'Saving entry...';

        const formData = new FormData();
        formData.append('game_name', selectedGame.game_name);
        formData.append('catalogID', selectedGame.catalogID);
        formData.append('badge', badge);
        formData.append('PTWID', selectedGame.PTWID);
